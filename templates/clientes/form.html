{% extends "base/base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}<i class="bi bi-person-vcard me-2"></i>{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">{{ titulo }}</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
            <input type="text" name="nome" class="form-control"
                   value="{{ dados.nome|default:'' }}" required placeholder="Nome completo"/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">CPF <span class="text-danger">*</span></label>
            <input type="text" name="cpf" class="form-control" id="cpf"
                   value="{{ dados.cpf|default:'' }}" required
                   placeholder="000.000.000-00" maxlength="14"/>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">E-mail</label>
              <input type="email" name="email" class="form-control"
                     value="{{ dados.email|default:'' }}" placeholder="email@exemplo.com"/>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Telefone</label>
              <input type="text" name="telefone" class="form-control"
                     value="{{ dados.telefone|default:'' }}" placeholder="(00) 00000-0000"/>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Endereço</label>
            <input type="text" name="endereco" class="form-control"
                   value="{{ dados.endereco|default:'' }}" placeholder="Rua, Número, Bairro, Cidade"/>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Salvar
            </button>
            <a href="/clientes/" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  // Máscara simples para CPF
  document.getElementById('cpf').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').substring(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    this.value = v;
  });
</script>
{% endblock %}
