<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recuperar Senha — SGC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3c5e 0%, #2e86c1 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 1rem; padding: 2.5rem 2rem;
      width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .login-card .logo { font-size: 1.8rem; font-weight: 800; color: #1a3c5e; letter-spacing: 1px; }
    .login-card .logo span { color: #f39c12; }
    .btn-login {
      background: #1a3c5e; color: #fff; border: none; border-radius: .5rem;
      padding: .7rem; font-size: 1rem; font-weight: 600; width: 100%; transition: background .2s;
    }
    .btn-login:hover { background: #2e86c1; color: #fff; }
    .form-control:focus { border-color: #2e86c1; box-shadow: 0 0 0 .2rem rgba(46,134,193,.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="logo"><i class="bi bi-shop"></i> SG<span>C</span></div>
      <p class="text-muted mt-1" style="font-size:.9rem">Recuperação de Senha</p>
    </div>

    <p class="text-muted mb-3" style="font-size:.88rem">
      Informe seu usuário. Se houver um e-mail cadastrado, você receberá
      as instruções para redefinir sua senha.
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          {{ form.email }}
        </div>
        {% if form.email.errors %}
          <div class="text-danger mt-1" style="font-size:.82rem">{{ form.email.errors }}</div>
        {% endif %}
      </div>
      <button type="submit" class="btn-login mb-3">
        <i class="bi bi-envelope me-2"></i>Enviar Link de Recuperação
      </button>
      <div class="text-center">
        <a href="/auth/login/" class="text-muted" style="font-size:.83rem">
          <i class="bi bi-arrow-left me-1"></i>Voltar ao login
        </a>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
