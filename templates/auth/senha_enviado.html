<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-mail Enviado — SGC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3c5e 0%, #2e86c1 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 1rem; padding: 2.5rem 2rem;
      width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.18);
      text-align: center;
    }
    .btn-login {
      background: #1a3c5e; color: #fff; border: none; border-radius: .5rem;
      padding: .7rem 1.5rem; font-size: 1rem; font-weight: 600; transition: background .2s;
      text-decoration: none; display: inline-block;
    }
    .btn-login:hover { background: #2e86c1; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <i class="bi bi-envelope-check text-success" style="font-size:3rem"></i>
    <h5 class="mt-3 mb-2 fw-bold">E-mail enviado!</h5>
    <p class="text-muted mb-4" style="font-size:.9rem">
      Se o usuário informado possuir um e-mail cadastrado, você receberá
      as instruções para redefinir sua senha em breve.
      Verifique também sua pasta de spam.
    </p>
    <a href="/auth/login/" class="btn-login">
      <i class="bi bi-arrow-left me-2"></i>Voltar ao login
    </a>
  </div>
</body>
</html>
