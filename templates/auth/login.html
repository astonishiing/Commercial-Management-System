<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SGC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3c5e 0%, #2e86c1 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .login-card .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #1a3c5e;
      letter-spacing: 1px;
    }
    .login-card .logo span { color: #f39c12; }
    .btn-login {
      background: #1a3c5e;
      color: #fff;
      border: none;
      border-radius: .5rem;
      padding: .7rem;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      transition: background .2s;
    }
    .btn-login:hover { background: #2e86c1; color: #fff; }
    .form-control:focus { border-color: #2e86c1; box-shadow: 0 0 0 .2rem rgba(46,134,193,.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="logo"><i class="bi bi-shop"></i> SG<span>C</span></div>
      <p class="text-muted mt-1" style="font-size:.9rem">Sistema de Gestão Comercial</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-danger py-2" style="font-size:.88rem">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="/auth/login/">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold" for="username">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="Seu usuário" value="{{ username|default:'' }}" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="password">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Sua senha" required/>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/auth/senha/recuperar/" class="text-muted" style="font-size:.83rem">
        <i class="bi bi-key me-1"></i>Esqueci minha senha
      </a>
    </div>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.78rem">
      SGC &copy; 2025 — Wagner, Eduardo, Gabriel, Guilherme
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
