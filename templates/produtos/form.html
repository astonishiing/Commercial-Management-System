{% extends "base/base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}<i class="bi bi-box-seam me-2"></i>{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">{{ titulo }}</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
            <input type="text" name="nome" class="form-control"
                   value="{{ dados.nome|default:'' }}" required placeholder="Nome do produto"/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3"
                      placeholder="Descrição do produto">{{ dados.descricao|default:'' }}</textarea>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Preço (R$) <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" name="preco" class="form-control" step="0.01" min="0"
                       value="{{ dados.preco|default:'' }}" required placeholder="0,00"/>
              </div>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Estoque <span class="text-danger">*</span></label>
              <input type="number" name="quantidade_estoque" class="form-control" min="0"
                     value="{{ dados.quantidade_estoque|default:'0' }}" required/>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Salvar
            </button>
            <a href="/produtos/" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
